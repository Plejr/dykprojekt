services:
  app:
    build:
      context: .
      dockerfile_inline: |
        FROM python:3.12-slim
        WORKDIR /app
        # Instalace knihoven přímo v buildu, aby nebylo potřeba requirements.txt
        RUN pip install --no-cache-dir flask psycopg2-binary requests httpx openai python-dotenv
        COPY . .
        EXPOSE 5000
        CMD ["python", "app.py"]
    ports:
      - "5000"
    environment:
      - DATABASE_URL=postgresql://student:heslo123@db:5432/manhwadb
      - OPENAI_API_KEY=sk-oPp-xXI9_eJllyfGQgf0Pw
      - OPENAI_BASE_URL=https://kurim.ithope.eu/v1
      # Systém Kuřim AI si PORT doplní sám, ale my ho tu definujeme jako fallback
      - PORT=5000
    depends_on:
      - db

  db:
    image: postgres:16-alpine
    environment:
      - POSTGRES_USER=student
      - POSTGRES_PASSWORD=heslo123
      - POSTGRES_DB=manhwadb
      - PGDATA=/data/pgdata
    # Data se ukládají do /data, což je na serveru perzistentní uložistě
    restart: always
