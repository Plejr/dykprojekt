services:
  app:
    build: .
    ports:
      - "5000"
    environment:
      - DATABASE_URL=postgresql://postgres:heslo123@db:5432/manhwadb
      - OPENAI_API_KEY=OPENAI_API_KEY
      - OPENAI_BASE_URL=
      - PORT=5000
    depends_on:
      - db

  db:
    image: postgres:16-alpine
    environment:
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=heslo123
      - POSTGRES_DB=manhwadb
      - PGDATA=/data/pgdata_new
    restart: always
