services:
  web:
    build:
      context: .
      dockerfile_inline: |
        FROM python:3.11-slim
        WORKDIR /app
        # Pokud nemůžeš nahrát requirements.txt, nainstalujeme to přímo:
        RUN pip install --no-cache-dir flask requests httpx openai python-dotenv psycopg2-binary
        COPY . .
        EXPOSE 5000
        CMD ["python", "app.py"]
    ports:
      - "5000:5000"
    environment:
      - DB_HOST=db
      - DB_PORT=5432
      - DB_USER=postgres
      - DB_PASS=super_tajne_heslo
      - DB_NAME=manhwadb
    depends_on:
      - db
    restart: always

  db:
    image: postgres:15-alpine
    environment:
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=super_tajne_heslo
      - POSTGRES_DB=manhwadb
    volumes:
      - /data/pg_data:/var/lib/postgresql/data
    restart: always
